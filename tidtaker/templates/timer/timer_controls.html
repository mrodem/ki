{{define "timer_section"}}
<div class="bg-white rounded-lg shadow-md p-6 mb-6">
  {{if .ActiveTiming}}
  <!-- Active timer -->
  <div class="text-center">
    <div class="text-lg font-medium text-green-600 mb-2">Timer aktiv</div>
    <div class="text-3xl font-mono font-bold text-gray-800 mb-4" id="active-timer"
      data-start-time="{{(.ActiveTiming.GetDateTime "startTime").Unix}}">
      {{formatDuration (.ActiveTiming.GetDateTime "startTime") (.ActiveTiming.GetDateTime "stopTime")}}
    </div>
    <script>
      (function() {
        var el = document.getElementById('active-timer');
        if (!el) return;
        var startUnix = parseInt(el.dataset.startTime, 10);
        function pad(n) { return String(n).padStart(2, '0'); }
        function tick() {
          var seconds = Math.floor(Date.now() / 1000) - startUnix;
          var h = Math.floor(seconds / 3600);
          var m = Math.floor((seconds % 3600) / 60);
          var s = seconds % 60;
          el.textContent = (h > 0 ? h + ':' : '') + pad(m) + ':' + pad(s);
        }
        tick();
        var iv = setInterval(function() {
          if (!document.getElementById('active-timer')) { clearInterval(iv); return; }
          tick();
        }, 1000);
      })();
    </script>
    <button
      class="bg-red-500 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition-colors font-medium text-lg"
      hx-post="/api/timings/{{.ActiveTiming.Id}}/stop"
      hx-target="#timer-section"
      hx-swap="innerHTML">
      ⏹ Stopp
    </button>
  </div>

  <!-- Description for active timing -->
  <div class="mt-4">
    <input type="text" placeholder="Beskrivelse..."
      value="{{.ActiveTiming.GetString "description"}}"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      hx-patch="/api/timings/{{.ActiveTiming.Id}}/edit-description"
      hx-trigger="input changed delay:500ms"
      hx-target="closest div"
      hx-swap="none"
      name="description">
  </div>

  <!-- Tags for active timing -->
  <div class="mt-3 flex flex-wrap gap-2 items-center">
    {{range .ActiveTiming.GetStringSlice "tags"}}
    <span class="inline-flex items-center bg-blue-100 text-blue-800 text-sm px-2 py-1 rounded">
      {{.}}
      <button class="ml-1 text-blue-600 hover:text-blue-800"
        hx-post="/api/timings/{{$.ActiveTiming.Id}}/remove-tag"
        hx-vals='{"tag": "{{.}}"}'
        hx-target="#timer-section"
        hx-swap="innerHTML">&times;</button>
    </span>
    {{end}}
    <form class="inline-flex items-center gap-1"
      hx-post="/api/timings/{{.ActiveTiming.Id}}/add-tag"
      hx-target="#timer-section"
      hx-swap="innerHTML">
      <input type="text" name="tag" placeholder="Ny tag..."
        class="px-2 py-1 text-sm border border-gray-300 rounded-md w-24 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <button type="submit" class="text-sm bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600">+</button>
    </form>
  </div>

  {{else}}
  <!-- No active timer -->
  <div class="text-center">
    <div class="text-lg text-gray-500 mb-4">Ingen aktiv timer</div>
    <button
      class="bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 transition-colors font-medium text-lg"
      hx-post="/api/timings/start"
      hx-target="#timer-section"
      hx-swap="innerHTML">
      ▶ Start
    </button>
  </div>
  {{end}}
</div>
{{end}}
